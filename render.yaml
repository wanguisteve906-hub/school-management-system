services:
  - type: web
    name: elimu-hms-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elimu-hms-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: DATABASE_AUTO_CREATE
        value: "true"
    healthCheckPath: /health

databases:
  - name: elimu-hms-db
    plan: free
    region: oregon
    ipAllowList: []
